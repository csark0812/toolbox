# yaml-language-server: $schema=node_modules/@csark0812/skeleton/schemas/config.schema.json

scan:
  include:
    - 'README.md'
    - 'AGENTS.md'
    - 'docs/**'
    - '.skeleton/registry.md'
    - 'agent-suites/README.md'
    - 'multi/**'
    - 'code-review/**'
    - 'crystallize/**'
    - 'grill/**'
    - 'second-opinion/**'
    - 'investigate/**'
    - 'handoff/**'
  exclude:
    - '.skeleton/references/**'
    - '**/references/**'
    # Install mirrors for Cursor/Codex — SSOT is flat <slug>/; do not treat as registry rows.
    - '.agents/skills/**'
    - '.claude/skills/**'
  banned: []
  retiredSkills:
    - branch-cleanup
    - product-principles
    - testing
    - pull-request
    - domain-modeling
    - debug

daysUntilStale: 180
