# yaml-language-server: $schema=node_modules/@csark0812/skeleton/schemas/config.schema.json

scan:
  include:
    - "README.md"
    - "docs/**"
    - ".skeleton/registry.md"
    - "multi/**"
    - "code-review/**"
    - "crystallize/**"
    - "grill/**"
    - "second-opinion/**"
    - "investigate/**"
    - "product-principles/**"
    - "domain-modeling/**"
    - "testing/**"
    - "debug/**"
    - "handoff/**"
    - "branch-cleanup/**"
    - "pull-request/**"
  exclude:
    - ".skeleton/references/**"
    - "**/references/**"
  banned: []
  retiredSkills: []

daysUntilStale: 180
