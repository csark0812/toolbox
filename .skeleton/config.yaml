# yaml-language-server: $schema=node_modules/@csark0812/skeleton/schemas/config.schema.json

scan:
  include:
    - "README.md"
    - "docs/**"
    - ".skeleton/registry.md"
    - "multi/**"
    - "code-review/**"
    - "crystallize/**"
    - "grill/**"
    - "second-opinion/**"
    - "investigate/**"
    - "handoff/**"
  exclude:
    - ".skeleton/references/**"
    - "**/references/**"
  banned: []
  retiredSkills:
    - branch-cleanup
    - product-principles
    - testing
    - pull-request
    - domain-modeling
    - debug

daysUntilStale: 180
